<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Creator Kids - Registro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Fondo Mágico Incrustado */
        body {
            background-image: url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Blobs animados con mezcla para dar efecto etéreo sobre la imagen */
        .background-blobs {
            opacity: 0.6;
            mix-blend-mode: overlay;
        }

        /* Tarjeta con efecto Glassmorphism (Vidrio) */
        .register-card {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border-radius: 1.5rem;
            overflow: hidden;
            /* Importante para que la imagen respete los bordes */
            padding-top: 0;
            max-width: 400px !important;
            /* Reducido para registro */
            margin: 0 auto;
        }

        /* Banner de Marca Full Width */
        .brand-logo-container {
            width: 100%;
            height: 150px;
            /* Altura reducida para el banner */
            background: white;
            position: relative;
        }

        .brand-logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Cubrir todo el espacio sin deformar */
            object-position: center;
        }
    </style>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
            <section class="register-card" style="padding-bottom: 1.5rem;">
                <!-- Imagen de Referencia de Marca como Banner -->
                <div class="brand-logo-container">
                    <img src="assets/images/HistoryCreatorKids.png" alt="History Creator Kids"
                        onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\'width:100\%; height:100\%; display:flex; align-items:center; justify-content:center; color:#6366f1; font-family:sans-serif; font-weight:bold; font-size:1.2rem; text-align:center; padding:1rem; background:#f0f9ff;\'><div style=\'line-height:1.2\'>History Creator Kids ✨</div></div>'">
                </div>

                <div style="padding: 0 1.5rem;">
                    <header class="header" style="margin-top: 1rem;">
                        <h1 style="color: #4f46e5; font-weight: 600; margin-bottom: 0.2rem; font-size: 1.3rem;">Crea tu cuenta</h1>
                        <p style="font-size: 0.85rem; opacity: 0.8;">Únete a la aventura de crear historias mágicas</p>
                    </header>

                    <form id="registerForm" class="form" style="gap: 0.8rem;">
                        <div class="avatar-upload" style="margin-bottom: 0.5rem;">
                            <div class="avatar-preview" style="width: 80px; height: 80px;">
                                <img id="imagePreview" src="https://via.placeholder.com/150/f0f0f0/cccccc?text=+"
                                    alt="Avatar Preview">
                                <label for="avatarInput" class="upload-btn" style="width: 28px; height: 28px;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <path
                                            d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                                        <circle cx="12" cy="13" r="4" />
                                    </svg>
                                </label>
                            </div>
                            <input type="file" id="avatarInput" accept="image/*" hidden>
                            <span style="font-size: 0.8rem;">Foto de perfil</span>
                        </div>

                        <div class="input-group">
                            <label for="username" style="font-size: 0.85rem; margin-bottom: 0.2rem;">Nombre de usuario</label>
                            <input type="text" id="username" placeholder="Tu nombre artístico" required style="padding: 0.6rem 0.9rem; font-size: 0.9rem;">
                        </div>

                        <div class="input-group">
                            <label for="email" style="font-size: 0.85rem; margin-bottom: 0.2rem;">Correo electrónico</label>
                            <input type="email" id="email" placeholder="ejemplo@correo.com" required style="padding: 0.6rem 0.9rem; font-size: 0.9rem;">
                        </div>

                        <div class="input-grid" style="gap: 0.75rem;">
                            <div class="input-group">
                                <label for="password" style="font-size: 0.85rem; margin-bottom: 0.2rem;">Contraseña</label>
                                <input type="password" id="password" placeholder="••••••••" required style="padding: 0.6rem 0.9rem; font-size: 0.9rem;">
                            </div>
                            <div class="input-group">
                                <label for="confirmPassword" style="font-size: 0.85rem; margin-bottom: 0.2rem;">Confirmar</label>
                                <input type="password" id="confirmPassword" placeholder="••••••••" required style="padding: 0.6rem 0.9rem; font-size: 0.9rem;">
                            </div>
                        </div>

                        <div class="input-group" style="flex-direction: row; align-items: flex-start; gap: 0.5rem; margin-top: 0.5rem;">
                            <input type="checkbox" id="termsCheckbox" required style="width: auto; margin-top: 0.2rem;">
                            <label for="termsCheckbox" style="font-size: 0.8rem; line-height: 1.4;">
                                Acepto las <a href="terms.html" target="_blank" style="color: var(--primary); font-weight: 600;">Reglas de Uso</a> y la 
                                <a href="privacy.html" target="_blank" style="color: var(--primary); font-weight: 600;">Política de Privacidad</a>.
                            </label>
                        </div>

                        <button type="submit" class="submit-btn" style="padding: 0.8rem; font-size: 1rem; margin-top: 0.5rem;">
                            <span>Empezar aventura</span>
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="5" y1="12" x2="19" y2="12" />
                                <polyline points="12 5 19 12 12 19" />
                            </svg>
                        </button>
                    </form>

                    <footer class="footer" style="margin-top: 1.2rem;">
                        <p style="font-size: 0.85rem;">¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
                    </footer>
                </div>
            </section>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

        // Configuración de Firebase Real (cuentos-infantiles-2026)
        const firebaseConfig = {
            apiKey: "AIzaSyA7vi4r6ahe-sZf8bFW0u1zCB54JkHPDFw",
            authDomain: "cuentos-infantiles-2026.firebaseapp.com",
            projectId: "cuentos-infantiles-2026",
            storageBucket: "cuentos-infantiles-2026.firebasestorage.app",
            messagingSenderId: "454293856709",
            appId: "1:454293856709:web:6b40a7fa1788e3681c6bac",
            measurementId: "G-GSLT5XHTPV"
        };
        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
    </script>

    <script src="database.js"></script>
    <script src="script.js"></script>
</body>

</html>
