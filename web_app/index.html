<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Creator Kids ✨ — ¡Crea tu propia aventura!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="magic-v22.css">
    <style>
        /* ─── V17 CLASSIC CASTLE DESIGN (REFINED) ─── */
        body {
            background-image: url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
            font-family: 'Outfit', sans-serif;
        }

        /* Capa etérea sobre el fondo */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.4) 100%);
            z-index: 0;
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: clamp(1.5rem, 5vw, 2.5rem);
            max-width: 420px; /* Ajuste sutil de ancho */
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            z-index: 10;
            text-align: center;
            border: 2px solid white;
            animation: cardSlide 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes cardSlide {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* LOGO AJUSTADO: Más grande pero con espacio seguro */
        .logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .logo-img {
            width: clamp(160px, 40vw, 220px); /* Logo más grande y responsivo */
            height: auto;
            border-radius: 1.2rem; /* Esquinas redondeadas suaves */
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        /* FUENTES RESPONSIVAS Y EQUITATIVAS */
        h1 {
            font-family: 'Quicksand', sans-serif;
            color: #4f46e5;
            font-size: clamp(1.6rem, 6vw, 2.2rem); /* Escala con la ventana */
            margin: 0.5rem 0 1rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .hero-desc {
            color: #64748b;
            font-size: clamp(0.9rem, 3vw, 1.05rem); /* Distribución equitativa */
            line-height: 1.6;
            margin-bottom: 2rem;
            max-width: 90%;
        }

        .cta-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .btn {
            width: 100%;
            padding: 1.1rem;
            border-radius: 1rem;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.05rem;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
        }

        .btn-secondary {
            background: #f8fafc;
            color: #4f46e5;
            border: 1px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #f1f5f9;
        }

        .magic-badge {
            background: #eff6ff;
            color: #4f46e5;
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-bottom: 1rem;
            display: inline-block;
            letter-spacing: 0.5px;
        }

        .magic-footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
    </style>
</head>

<body>
    <main class="hero-card">
        <div class="logo-container">
            <img src="assets/images/HistoryCreatorKids.png" class="logo-img" alt="History Creator Kids Logo" 
                 onerror="this.src='https://images.unsplash.com/photo-1544947950-fa07a98d237f?auto=format&fit=crop&q=80&w=800'; this.style.borderRadius='1.2rem';">
        </div>
        
        <div class="magic-badge">✨ V22 CREATIVE MAGIC</div>
        
        <h1>Cuentos Mágicos con IA</h1>
        <p class="hero-desc">Crea aventuras inolvidables con ilustraciones mágicas y narración por voz. ¡Tu imaginación es el límite!</p>
        
        <div class="cta-container">
            <a href="register.html" class="btn btn-primary">🚀 Empezar mi Aventura</a>
            <a href="login.html" class="btn btn-secondary">Ya tengo cuenta</a>
        </div>
        
        <div class="magic-footer">
            <span>🪄</span> Portal Seguro para Niños
        </div>
    </main>

    <script>
        // Asegurar que no quede nada del diseño anterior
        if ('caches' in window) caches.keys().then(names => names.forEach(n => caches.delete(n)));
        if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
    </script>
</body>

</html>
