<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector de Cuentos Mágicos ✨</title>
    <script src="mascot.js?v=19.4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Quicksand:wght@400;600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        /* STORY READER V20 MAGIC OVERHAUL */
    </style>
</head>

    </style>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2" style="background: #fbcfe8;"></div>
        <div class="blob blob-3" style="background: #ddd6fe;"></div>
    </div>

    <!-- HEADER OVERLAY PARA AGRUPAR CONTROLES (Evitar superposición) -->
    <div class="header-overlay">
        <!-- BOTÓN DE REGRESO ARREGLADO -->
        <div class="close-reader" onclick="window.location.href='dashboard.html'">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6" />
            </svg>
            <span>Volver a Biblioteca</span>
        </div>

        <!-- BOTONES DE CONTROL SUPERIOR ESTILIZADOS -->
        <div class="top-toolbar">
        <!-- BOTÓN DE MÚSICA -->
        <button class="top-control-btn" id="musicBtn" onclick="toggleMusic()" title="Música Mágica" style="color: #10b981;">
            <svg id="musicIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18V5l12-2v13" />
                <circle cx="6" cy="18" r="3" />
                <circle cx="18" cy="16" r="3" />
            </svg>
        </button>
        <!-- BOTÓN DE NARRACIÓN (TTS) -->
        <button class="top-control-btn" id="speakBtn" onclick="toggleSpeech()" title="Escuchar cuento" style="color: #6366f1;">
            <svg id="speakerIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
            </svg>
        </button>
        <!-- TRADUCTOR MÁGICO -->
        <button class="top-control-btn" id="langBtn" onclick="toggleLanguage()" title="Traductor Mágico" style="color: #8b5cf6;">
            <span id="langText" style="font-weight: 800; font-size: 0.8rem;">EN</span>
        </button>
        <!-- BOTÓN DE COLOREAR -->
        <button class="top-control-btn" id="colorBtn" onclick="toggleColoringMode()" title="Modo Colorear" style="color: #f59e0b;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 19l7-7 3 3-7 7-3-3z" />
                <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z" />
                <path d="M2 2l5 5" />
                <path d="M9.5 14.5L16 18" />
            </svg>
        </button>
        <!-- BOTÓN DE REPORTE -->
        <button class="top-control-btn" id="reportBtn" onclick="reportContent()" title="Reportar contenido inapropiado" style="color: #f43f5e;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z" />
                <line x1="4" y1="22" x2="4" y2="15" />
            </svg>
        </button>
        <!-- BOTÓN DE PUZZLE -->
        <button class="top-control-btn" id="puzzleBtn" onclick="openPuzzle()" title="Jugar Puzzle de este cuento" style="color: #ec4899;">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11.75 5.92a.75.75 0 0 0-1.5 0v1.65a2.25 2.25 0 0 1-2.25 2.25h-1.65a.75.75 0 0 0 0 1.5h1.65a2.25 2.25 0 0 1 2.25 2.25v1.65a.75.75 0 0 0 1.5 0v-1.65a2.25 2.25 0 0 1 2.25-2.25h1.65a.75.75 0 0 0 0-1.5h-1.65a2.25 2.25 0 0 1-2.25-2.25V5.92Z" />
                <path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
        </button>
    </div>
    </div>
    </div> <!-- Cierre de header-overlay -->

    <!-- BARRA DE PROGRESO (V19.7) -->
    <div class="progress-bar-container">
        <div id="readerProgressFill" class="progress-bar-fill"></div>
    </div>

    <!-- ELEMENTOS ESCÉNICOS -->
    <div id="particles-js" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none;"></div>
    <audio id="pageTurnSfx" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="bgMusic" loop preload="auto"></audio>
    <audio id="ambientLoop" loop preload="auto"></audio>
    <canvas id="magicCanvas" style="position: fixed; top: 0; left: 0; pointer-events: none; z-index: 50;"></canvas>

    <div class="magic-score-badge" id="magicScoreBadge">
        <span class="sparkle-btn">✨</span>
        <span id="magicScore">0</span>
    </div>

    <main class="reader-container">
        <div class="book-wrapper">
            <div class="book-page page-left" id="drawingWrapper">
                <img id="storyImg"
                    src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?auto=format&fit=crop&q=80&w=800"
                    class="story-image">
                <canvas id="drawingCanvas" class="drawing-canvas"></canvas>
            </div>
            <div class="book-page page-right">
                <div id="pageContent">
                    <h1 class="story-title-page" id="storyTitle">Cargando cuento...</h1>
                    <p class="story-text" id="storyBody">La magia está en camino...</p>
                </div>
            </div>
        </div>

        <div class="navigation-controls">
            <button class="nav-btn-circle" id="prevPage" onclick="changePage(-1)" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                </svg>
            </button>
            <span style="font-weight: 600; color: #64748b;"><span id="currNum">1</span> / <span
                    id="totalNum">3</span></span>
            <button class="nav-btn-circle" id="nextPage" onclick="changePage(1)">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m9 18 6-6-6-6" />
                </svg>
            </button>
        </div>
    </main>

    <!-- BARRA DE HERRAMIENTAS DE DIBUJO -->
    <div class="drawing-toolbar" id="drawingToolbar">
        <div class="color-dot active" style="background: #ef4444;" onclick="setBrushColor('#ef4444', this)"></div>
        <div class="color-dot" style="background: #3b82f6;" onclick="setBrushColor('#3b82f6', this)"></div>
        <div class="color-dot" style="background: #10b981;" onclick="setBrushColor('#10b981', this)"></div>
        <div class="color-dot" style="background: #f59e0b;" onclick="setBrushColor('#f59e0b', this)"></div>
        <div class="color-dot" style="background: #8b5cf6;" onclick="setBrushColor('#8b5cf6', this)"></div>
        <div class="color-dot" style="background: #000000;" onclick="setBrushColor('#000000', this)"></div>
        <div style="width: 1px; height: 30px; background: #e2e8f0;"></div>
        <button class="tool-btn" onclick="clearDrawing()" title="Borrar todo">🗑️</button>
        <button class="tool-btn" onclick="saveDrawing()" title="Guardar en Perfil">💾</button>
        <button class="tool-btn" onclick="downloadDrawing()" title="Descargar Imagen">📥</button>
        <button class="tool-btn" onclick="toggleColoringMode()" title="Cerrar Taller" style="background: #fee2e2; color: #ef4444; border-radius: 50%;">✕</button>
    </div>

    <script src="firebase-init.js"></script>
    <script src="database.js"></script>
    <script src="story-reader.js"></script>

</body>

</html>
